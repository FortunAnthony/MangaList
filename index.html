<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f0e8;
    --red: #c0392b;
    --blue: #3498db;
    --gold: #d4a017;
    --panel-bg: #1a1a24;
    --panel-light: #242436;
    --text-light: #e8e0d0;
    --text-dim: #7a7468;
    --green: #2ecc71;
    --orange: #e67e22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 2px solid rgba(255,255,255,0.06);
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 88px);
    letter-spacing: 4px;
    line-height: 0.9;
    color: var(--paper);
    text-shadow: 4px 4px 0 var(--blue);
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--panel-light);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 12px;
    letter-spacing: 1px;
    flex: 1;
    min-width: 100px;
    text-align: center;
  }

  .stat-pill span {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-pill.green span { color: var(--green); }
  .stat-pill.gold span  { color: var(--gold); }
  .stat-pill.blue span  { color: var(--blue); }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--panel-bg);
    padding: 4px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .tab.active { background: var(--blue); color: white; }
  .tab:hover:not(.active) { background: rgba(255,255,255,0.05); color: var(--text-light); }

  .section { display: none; }
  .section.active { display: block; }

  .progress-wrap {
    background: var(--panel-light);
    border-radius: 3px;
    height: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .manga-list { display: flex; flex-direction: column; gap: 6px; }

  .manga-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
  }

  .manga-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--blue);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .manga-card:hover { background: var(--panel-light); border-color: rgba(255,255,255,0.12); }
  .manga-card:hover::before { opacity: 1; }

  .manga-card.status-ongoing::before { background: var(--gold);  opacity: 1; }
  .manga-card.status-ended::before   { background: var(--green); opacity: 1; }
  .manga-card.completed-card::before { background: var(--green); opacity: 1; }

  /* ── MAIN READ HIGHLIGHT ── */
  .manga-card.is-main {
    background: rgba(212, 160, 23, 0.07);
    border-color: rgba(212, 160, 23, 0.35);
  }
  .manga-card.is-main::before {
    background: var(--gold);
    opacity: 1;
    width: 4px;
  }
  .manga-card.is-main:hover {
    background: rgba(212, 160, 23, 0.12);
    border-color: rgba(212, 160, 23, 0.5);
  }
  .card-btn.btn-pin-active {
    background: rgba(212, 160, 23, 0.15) !important;
    border-color: var(--gold) !important;
    color: var(--gold) !important;
  }

  .drag-handle {
    cursor: grab;
    color: var(--text-dim);
    font-size: 16px;
    padding: 4px 2px;
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
    letter-spacing: -1px;
  }
  .drag-handle:active { cursor: grabbing; }

  .manga-card.dragging  { opacity: 0.4; border: 1px dashed rgba(255,255,255,0.2); }
  .manga-card.drag-over { border-color: var(--gold); background: rgba(212,160,23,0.08); }

  .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    min-width: 26px;
    text-align: right;
    line-height: 1;
    flex-shrink: 0;
  }

  .manga-info { flex: 1; min-width: 0; }

  .manga-title {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .manga-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

  .tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
  }

  .tag.length-short     { background: rgba(52,152,219,0.15);  color: #5dade2;  border: 1px solid rgba(52,152,219,0.2); }
  .tag.length-medium    { background: rgba(212,160,23,0.15);  color: #f0b429;  border: 1px solid rgba(212,160,23,0.2); }
  .tag.length-long      { background: rgba(192,57,43,0.15);   color: #e74c3c;  border: 1px solid rgba(192,57,43,0.2); }
  .tag.length-very-long { background: rgba(142,68,173,0.15);  color: #a569bd;  border: 1px solid rgba(142,68,173,0.2); }
  .tag.genre            { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08); }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

  .card-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 13px;
    padding: 5px 8px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }

  .card-btn:hover            { background: rgba(255,255,255,0.12); color: var(--text-light); }
  .card-btn.btn-green:hover  { background: rgba(46,204,113,0.15);  border-color: var(--green);  color: var(--green); }
  .card-btn.btn-blue:hover   { background: rgba(52,152,219,0.15);  border-color: var(--blue);   color: var(--blue); }
  .card-btn.btn-orange:hover { background: rgba(230,126,34,0.15);  border-color: var(--orange); color: var(--orange); }
  .card-btn.btn-red:hover    { background: rgba(192,57,43,0.15);   border-color: var(--red);    color: var(--red); }
  .card-btn.btn-gold:hover   { background: rgba(212,160,23,0.15);  border-color: var(--gold);   color: var(--gold); }

  /* Clickable status badge */
  .status-badge {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .badge-ongoing {
    background: rgba(212,160,23,0.15);
    color: var(--gold);
    border: 1px solid rgba(212,160,23,0.35);
  }
  .badge-ongoing:hover {
    background: rgba(46,204,113,0.15);
    color: var(--green);
    border-color: rgba(46,204,113,0.35);
  }
  .badge-ended {
    background: rgba(46,204,113,0.15);
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.35);
  }
  .badge-ended:hover {
    background: rgba(212,160,23,0.15);
    color: var(--gold);
    border-color: rgba(212,160,23,0.35);
  }

  .status-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.ongoing { background: var(--gold);  box-shadow: 0 0 6px var(--gold);  animation: pulse 2s infinite; }
  .status-dot.ended   { background: var(--green); box-shadow: 0 0 6px var(--green); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.35; }
  }

  /* Add form */
  .add-form {
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .add-form-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .add-form-row  { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-form-row2 { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  .add-input {
    flex: 2;
    min-width: 140px;
    background: var(--panel-light);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input:focus { border-color: rgba(255,255,255,0.25); }

  .add-select {
    flex: 1;
    min-width: 80px;
    background: var(--panel-light);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    cursor: pointer;
  }
  .add-select option { background: var(--panel-bg); }

  .add-btn {
    background: var(--blue);
    border: none;
    border-radius: 4px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 9px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.85; }

  .completed-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 3px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    color: var(--paper);
  }

  .modal p {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  .modal-input {
    width: 100%;
    background: var(--panel-light);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    margin-bottom: 14px;
  }
  .modal-input:focus { border-color: rgba(255,255,255,0.25); }

  .modal-btns { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-btn.confirm { background: var(--green); color: #000; }
  .modal-btn.cancel  { background: var(--panel-light); color: var(--text-dim); }
  .modal-btn:hover   { opacity: 0.85; }

  .toolbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--blue); color: var(--blue); }
</style>
</head>
<body>

<!-- Date modal -->
<div class="modal-overlay hidden" id="dateModal">
  <div class="modal">
    <h3>Mark Completed</h3>
    <p id="modalTitle">Moving to completed list</p>
    <input type="date" class="modal-input" id="modalDate">
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modalCancelBtn">Cancel</button>
      <button class="modal-btn confirm" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <div class="header-eyebrow">Personal Library</div>
    <h1>MANGA<br>TRACKER</h1>
    <div class="header-sub" id="headerSub">Loading...</div>
  </header>

  <div class="stats-bar">
    <div class="stat-pill green"><span id="statCompleted">0</span>Completed</div>
    <div class="stat-pill gold"><span id="statQueue">0</span>Queue</div>
    <div class="stat-pill blue"><span id="statReading">0</span>Reading</div>
  </div>

  <div class="tabs">
    <button class="tab" onclick="switchTab('completed', this)">✅ Completed</button>
    <button class="tab" onclick="switchTab('future', this)">🗂 Queue</button>
    <button class="tab active" onclick="switchTab('reading', this)">📖 Reading</button>
  </div>

  <!-- COMPLETED -->
  <div class="section" id="tab-completed">
    <div class="manga-list" id="list-completed"></div>
  </div>

  <!-- QUEUE -->
  <div class="section" id="tab-future">
    <div class="add-form">
      <div class="add-form-title">Add to Queue</div>
      <div class="add-form-row">
        <input class="add-input" id="addTitle" placeholder="Title..." />
        <select class="add-select" id="addLength">
          <option value="short">Short</option>
          <option value="medium" selected>Medium</option>
          <option value="long">Long</option>
          <option value="very-long">Very Long</option>
        </select>
      </div>
      <div class="add-form-row2">
        <input class="add-input" id="addGenre" placeholder="Genre (e.g. Action / Romance)" style="flex:2" />
        <select class="add-select" id="addPosition" style="flex:1"></select>
        <button class="add-btn" onclick="addToQueue()">Add</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="reset-btn" onclick="resetQueue()">Reset Queue</button>
    </div>
    <div class="progress-label" id="progressLabel">0 in queue</div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:100%"></div></div>
    <div class="manga-list" id="list-future"></div>
  </div>

  <!-- READING -->
  <div class="section active" id="tab-reading">
    <div class="manga-list" id="list-reading"></div>
  </div>
</div>

  { title: "Lord of the Mysteries",                         length: "very-long", genre: "Mystery / Fantasy" },
  { title: "JJK Modulo",                                    length: "short",     genre: "Action" },
  { title: "Bleach",                                        length: "very-long", genre: "Action / Fantasy" },
];

const INITIAL_COMPLETED = [
  { title: "Naruto",                              date: "" },
  { title: "Boruto",                              date: "" },
  { title: "Death Note",                          date: "" },
  { title: "Demon Slayer: Kimetsu no Yaiba",      date: "" },
  { title: "My Hero Academia",                    date: "" },
  { title: "Star of Beethoven",                   date: "" },
  { title: "Tokyo Ghoul",                         date: "" },
  { title: "Yu-Gi-Oh!",                           date: "" },
  { title: "You and I Are Polar Opposites",        date: "" },
  { title: "Astro Royale",                         date: "" },
  { title: "Velvet Kiss",                          date: "" },
  { title: "Fullmetal Alchemist",                  date: "" },
  { title: "Ane Doki",                             date: "" },
  { title: "Food Wars!: Shokugeki no Soma",        date: "" },
  { title: "Shokugeki no Sanji",                   date: "" },
  { title: "Romantic Killer",                      date: "" },
  { title: "Dr. Stone",                            date: "" },
  { title: "Show-ha Shoten!",                      date: "" },
  { title: "OTR of the Flame",                     date: "" },
];

// ── STATE ─────────────────────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem('mangaTrackerV3');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    reading:   JSON.parse(JSON.stringify(INITIAL_READING)),
    queue:     JSON.parse(JSON.stringify(INITIAL_QUEUE)),
    completed: JSON.parse(JSON.stringify(INITIAL_COMPLETED))
  };
}

function saveState() {
  localStorage.setItem('mangaTrackerV3', JSON.stringify(state));
}

let state = loadState();
let modalPending = null;
let dragSrcIdx   = null;

// ── HELPERS ───────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1])-1]} ${parseInt(parts[2])}, ${parts[0]}`;
}

function sortedReading() {
  const main    = state.reading.filter(m => m.isMain);
  const others  = state.reading.filter(m => !m.isMain)
                               .sort((a,b) => a.title.localeCompare(b.title));
  return [...main, ...others];
}

function sortedCompleted() {
  const noDate = state.completed.filter(m => !m.date)
                                .sort((a,b) => a.title.localeCompare(b.title));
  const dated  = state.completed.filter(m => m.date)
                                .sort((a,b) => a.date.localeCompare(b.date));
  return [...noDate, ...dated];
}

// ── MODAL ─────────────────────────────────────────────────────
document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
document.getElementById('modalConfirmBtn').addEventListener('click', confirmComplete);

function openModal(title) {
  modalPending = title;
  document.getElementById('modalTitle').textContent = `"${title}"`;
  document.getElementById('modalDate').value = today();
  document.getElementById('dateModal').classList.remove('hidden');
}

function closeModal() {
  modalPending = null;
  document.getElementById('dateModal').classList.add('hidden');
}

function confirmComplete() {
  if (!modalPending) return;
  const date = document.getElementById('modalDate').value;
  state.reading = state.reading.filter(m => m.title !== modalPending);
  state.completed.push({ title: modalPending, date });
  saveState();
  closeModal();
  renderAll();
}

// ── READING ───────────────────────────────────────────────────
function renderReading() {
  const el = document.getElementById('list-reading');
  const sorted = sortedReading();

  if (!sorted.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;">Nothing reading yet</div>';
    return;
  }

  el.innerHTML = sorted.map(m => {
    const isMain     = !!m.isMain;
    const statusCls  = m.status === 'ended' ? 'badge-ended' : 'badge-ongoing';
    const statusLbl  = m.status === 'ended' ? 'Ended' : 'Ongoing';
    const dotCls     = m.status === 'ended' ? 'ended' : 'ongoing';

    return `
    <div class="manga-card status-${m.status || 'ongoing'}${isMain ? ' is-main' : ''}"
         data-title="${encodeURIComponent(m.title)}">
      <div class="status-dot ${dotCls}"></div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="tags">
          <span class="status-badge ${statusCls}" data-action="toggle-status" data-title="${encodeURIComponent(m.title)}">${statusLbl}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn btn-blue"  data-action="to-queue"    data-title="${encodeURIComponent(m.title)}" title="Move back to Queue">↩</button>
        <button class="card-btn btn-gold${isMain ? ' btn-pin-active' : ''}" data-action="pin-main" data-title="${encodeURIComponent(m.title)}" title="${isMain ? 'Currently Main Read' : 'Set as Main Read'}">⭐</button>
        <button class="card-btn btn-green" data-action="to-complete" data-title="${encodeURIComponent(m.title)}" title="Mark Completed">✓</button>
      </div>
    </div>`;
  }).join('');

  // ── Event delegation for all reading actions ──
  el.onclick = function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const title  = decodeURIComponent(btn.dataset.title);
    const action = btn.dataset.action;

    if (action === 'toggle-status') {
      const m = state.reading.find(r => r.title === title);
      if (m) {
        m.status = m.status === 'ended' ? 'ongoing' : 'ended';
        saveState();
        renderReading();
        updateStats();
      }
    } else if (action === 'to-queue') {
      const m = state.reading.find(r => r.title === title);
      if (!m) return;
      state.reading = state.reading.filter(r => r.title !== title);
      state.queue.unshift({ title: m.title, length: 'medium', genre: 'Unknown' });
      saveState();
      renderAll();
    } else if (action === 'pin-main') {
      state.reading.forEach(r => r.isMain = false);
      const m = state.reading.find(r => r.title === title);
      if (m) m.isMain = true;
      saveState();
      renderReading();
    } else if (action === 'to-complete') {
      openModal(title);
    }
  };
}

// ── QUEUE ─────────────────────────────────────────────────────
function moveQueueToReading(idx) {
  const m = state.queue[idx];
  // New manga becomes main read; demote old main
  state.reading.forEach(r => r.isMain = false);
  state.reading.push({ title: m.title, status: 'ongoing', isMain: true });
  state.queue.splice(idx, 1);
  saveState();
  renderAll();
}

function removeFromQueue(idx) {
  if (confirm(`Remove "${state.queue[idx].title}" from queue?`)) {
    state.queue.splice(idx, 1);
    saveState();
    renderQueue();
    updateStats();
  }
}

function addToQueue() {
  const title = document.getElementById('addTitle').value.trim();
  const length = document.getElementById('addLength').value;
  const genre  = document.getElementById('addGenre').value.trim() || 'Unknown';
  const pos    = document.getElementById('addPosition').value;
  if (!title) return;
  const item = { title, length, genre };
  if (pos === 'end') {
    state.queue.push(item);
  } else {
    state.queue.splice(parseInt(pos), 0, item);
  }
  document.getElementById('addTitle').value  = '';
  document.getElementById('addGenre').value  = '';
  saveState();
  renderQueue();
  updateStats();
}

function resetQueue() {
  if (confirm('Reset queue to original list?')) {
    state.queue = JSON.parse(JSON.stringify(INITIAL_QUEUE));
    saveState();
    renderQueue();
    updateStats();
  }
}

function populatePositionSelect() {
  const sel = document.getElementById('addPosition');
  sel.innerHTML = '<option value="end">End</option>';
  state.queue.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Before #${i+1}: ${m.title.length > 22 ? m.title.slice(0,22)+'…' : m.title}`;
    sel.appendChild(opt);
  });
}

function renderQueue() {
  populatePositionSelect();
  const el = document.getElementById('list-future');
  document.getElementById('progressLabel').textContent = `${state.queue.length} in queue`;

  el.innerHTML = state.queue.map((m, i) => `
    <div class="manga-card" draggable="true" id="qcard-${i}">
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <div class="num">${i + 1}</div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="tags">
          <span class="tag length-${m.length}">${m.length.replace('-',' ')}</span>
          ${m.genre.split(' / ').map(g => `<span class="tag genre">${g}</span>`).join('')}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn btn-blue" data-action="start" data-idx="${i}" title="Start Reading">▶</button>
        <button class="card-btn btn-red"  data-action="remove" data-idx="${i}" title="Remove">✕</button>
      </div>
    </div>
  `).join('');

  // Button events
  el.onclick = function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx);
    if (btn.dataset.action === 'start')  moveQueueToReading(idx);
    if (btn.dataset.action === 'remove') removeFromQueue(idx);
  };

  // Drag & drop
  el.querySelectorAll('.manga-card').forEach((card, i) => {
    card.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => card.classList.add('dragging'), 0);
    });
    card.addEventListener('dragend', () => {
      el.querySelectorAll('.manga-card').forEach(c => c.classList.remove('dragging','drag-over'));
      dragSrcIdx = null;
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.querySelectorAll('.manga-card').forEach(c => c.classList.remove('drag-over'));
      if (i !== dragSrcIdx) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i) return;
      const item = state.queue.splice(dragSrcIdx, 1)[0];
      state.queue.splice(i, 0, item);
      dragSrcIdx = null;
      saveState();
      renderQueue();
    });
  });
}

// ── COMPLETED ─────────────────────────────────────────────────
function renderCompleted() {
  const el = document.getElementById('list-completed');
  const sorted = sortedCompleted();

  if (!sorted.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;">Nothing completed yet</div>';
    return;
  }

  el.innerHTML = sorted.map(m => `
    <div class="manga-card completed-card">
      <div style="font-size:16px;flex-shrink:0;color:var(--green)">✓</div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        ${m.date ? `<div class="completed-date">Completed ${formatDate(m.date)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="card-btn btn-blue" data-action="back-to-reading" data-title="${encodeURIComponent(m.title)}" title="Move back to Reading">↩ Reading</button>
      </div>
    </div>
  `).join('');

  el.onclick = function(e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const title = decodeURIComponent(btn.dataset.title);
    if (btn.dataset.action === 'back-to-reading') {
      state.completed = state.completed.filter(c => c.title !== title);
      state.reading.push({ title, status: 'ongoing', isMain: false });
      saveState();
      renderAll();
    }
  };
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statReading').textContent   = state.reading.length;
  document.getElementById('statQueue').textContent     = state.queue.length;
  document.getElementById('statCompleted').textContent = state.completed.length;
  const total = state.reading.length + state.queue.length + state.completed.length;
  document.getElementById('headerSub').textContent = `${total} titles in your library`;
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  renderReading();
  renderQueue();
  renderCompleted();
  updateStats();
}

renderAll();
</script>
</body>
</html>
