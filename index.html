  try {
    const s = localStorage.getItem('mangaTrackerV2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    reading: INITIAL_READING,
    queue: INITIAL_QUEUE,
    completed: INITIAL_COMPLETED
  };
}

function saveState() {
  localStorage.setItem('mangaTrackerV2', JSON.stringify(state));
}

let state = loadState();
let modalPending = null; // { title, fromReading: true }
let dragSrcIdx = null;

// ── HELPERS ───────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1])-1]} ${parseInt(parts[2])}, ${parts[0]}`;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title) {
  modalPending = title;
  document.getElementById('modalTitle').textContent = `"${title}"`;
  document.getElementById('modalDate').value = today();
  document.getElementById('dateModal').classList.remove('hidden');
}

function closeModal() {
  modalPending = null;
  document.getElementById('dateModal').classList.add('hidden');
}

function confirmComplete() {
  if (!modalPending) return;
  const date = document.getElementById('modalDate').value;
  // Remove from reading
  state.reading = state.reading.filter(m => m.title !== modalPending);
  // Add to completed
  state.completed.push({ title: modalPending, date });
  saveState();
  closeModal();
  renderAll();
}

// ── READING ───────────────────────────────────────────────────
function setReadingStatus(title, status) {
  const m = state.reading.find(r => r.title === title);
  if (m) { m.status = status; saveState(); renderReading(); updateStats(); }
}

function moveReadingToQueue(title) {
  const m = state.reading.find(r => r.title === title);
  if (!m) return;
  state.reading = state.reading.filter(r => r.title !== title);
  state.queue.unshift({ title: m.title, length: 'medium', genre: 'Unknown' });
  saveState();
  renderAll();
}

function moveReadingToCompleted(title) {
  openModal(title);
}

function renderReading() {
  const el = document.getElementById('list-reading');
  if (!state.reading.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;">Nothing reading yet</div>';
    return;
  }
  el.innerHTML = state.reading.map(m => {
    const statusLabel = m.status === 'ongoing' ? 'Ongoing' : m.status === 'ended' ? 'Ended' : 'Completed';
    const badgeClass = m.status === 'ongoing' ? 'badge-ongoing' : m.status === 'ended' ? 'badge-ended' : 'badge-completed-read';
    const dotClass = m.status || 'ongoing';
    return `
    <div class="manga-card status-${m.status || 'ongoing'}">
      <div class="status-dot ${dotClass}"></div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="tags"><span class="status-badge ${badgeClass}">${statusLabel}</span></div>
      </div>
      <div class="card-actions">
        ${m.status !== 'ongoing' ? `<button class="card-btn btn-orange" title="Mark Ongoing" onclick="setReadingStatus('${esc(m.title)}','ongoing')">🟡</button>` : ''}
        ${m.status !== 'ended' ? `<button class="card-btn btn-orange" title="Mark Ended" onclick="setReadingStatus('${esc(m.title)}','ended')">🔴</button>` : ''}
        <button class="card-btn btn-green" title="Mark Completed" onclick="moveReadingToCompleted('${esc(m.title)}')">✓</button>
        <button class="card-btn btn-red" title="Move back to Queue" onclick="moveReadingToQueue('${esc(m.title)}')">↩</button>
      </div>
    </div>`;
  }).join('');
}

// ── QUEUE ─────────────────────────────────────────────────────
function moveQueueToReading(idx) {
  const m = state.queue[idx];
  state.reading.push({ title: m.title, status: 'ongoing' });
  state.queue.splice(idx, 1);
  saveState();
  renderAll();
}

function removeFromQueue(idx) {
  if (confirm(`Remove "${state.queue[idx].title}" from queue?`)) {
    state.queue.splice(idx, 1);
    saveState();
    renderQueue();
    updateStats();
  }
}

function addToQueue() {
  const title = document.getElementById('addTitle').value.trim();
  const length = document.getElementById('addLength').value;
  const genre = document.getElementById('addGenre').value.trim() || 'Unknown';
  const pos = document.getElementById('addPosition').value;
  if (!title) return;
  const item = { title, length, genre };
  if (pos === 'end') {
    state.queue.push(item);
  } else {
    state.queue.splice(parseInt(pos), 0, item);
  }
  document.getElementById('addTitle').value = '';
  document.getElementById('addGenre').value = '';
  saveState();
  renderQueue();
  updateStats();
}

function resetQueue() {
  if (confirm('Reset queue to original list?')) {
    state.queue = JSON.parse(JSON.stringify(INITIAL_QUEUE));
    saveState();
    renderQueue();
    updateStats();
  }
}

function populatePositionSelect() {
  const sel = document.getElementById('addPosition');
  sel.innerHTML = '<option value="end">End</option>';
  state.queue.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `Before #${i+1}: ${m.title.length > 22 ? m.title.slice(0,22)+'…' : m.title}`;
    sel.appendChild(opt);
  });
}

function renderQueue() {
  populatePositionSelect();
  const el = document.getElementById('list-future');
  const total = state.queue.length;
  document.getElementById('progressLabel').textContent = `${total} in queue`;
  document.getElementById('progressBar').style.width = '100%';

  el.innerHTML = state.queue.map((m, i) => `
    <div class="manga-card" draggable="true"
      ondragstart="dragStart(event,${i})"
      ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})"
      ondragleave="dragLeave(event)"
      ondragend="dragEnd(event)"
      id="qcard-${i}">
      <div class="drag-handle" title="Drag to reorder">⠿</div>
      <div class="num">${i + 1}</div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="tags">
          <span class="tag length-${m.length}">${m.length.replace('-',' ')}</span>
          ${m.genre.split(' / ').map(g => `<span class="tag genre">${g}</span>`).join('')}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn btn-blue" title="Start Reading" onclick="moveQueueToReading(${i})">▶</button>
        <button class="card-btn btn-red" title="Remove" onclick="removeFromQueue(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

// ── DRAG & DROP ───────────────────────────────────────────────
function dragStart(e, idx) {
  dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById(`qcard-${idx}`); if(el) el.classList.add('dragging'); }, 0);
}

function dragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.manga-card.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.getElementById(`qcard-${idx}`);
  if (el && idx !== dragSrcIdx) el.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dragDrop(e, idx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === idx) return;
  const item = state.queue.splice(dragSrcIdx, 1)[0];
  state.queue.splice(idx, 0, item);
  dragSrcIdx = null;
  saveState();
  renderQueue();
}

function dragEnd(e) {
  document.querySelectorAll('.manga-card.dragging, .manga-card.drag-over').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  dragSrcIdx = null;
}

// ── COMPLETED ─────────────────────────────────────────────────
function renderCompleted() {
  const el = document.getElementById('list-completed');
  if (!state.completed.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;">Nothing completed yet</div>';
    return;
  }
  el.innerHTML = [...state.completed].reverse().map(m => `
    <div class="manga-card completed-card" style="cursor:default">
      <div style="font-size:16px;flex-shrink:0">✓</div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        ${m.date ? `<div class="completed-date">Completed ${formatDate(m.date)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statReading').textContent = state.reading.length;
  document.getElementById('statQueue').textContent = state.queue.length;
  document.getElementById('statCompleted').textContent = state.completed.length;
  const total = state.reading.length + state.queue.length + state.completed.length;
  document.getElementById('headerSub').textContent = `${total} titles in your library`;
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── ESCAPE helper ─────────────────────────────────────────────
function esc(str) { return str.replace(/'/g, "\\'"); }

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  renderReading();
  renderQueue();
  renderCompleted();
  updateStats();
}

// ── INIT ──────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
