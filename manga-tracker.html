<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f0e8;
    --red: #c0392b;
    --gold: #d4a017;
    --muted: #8a8070;
    --panel-bg: #1a1a24;
    --panel-light: #242436;
    --text-light: #e8e0d0;
    --text-dim: #7a7468;
    --green: #2ecc71;
    --blue: #3498db;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text-light);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Halftone background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 2px solid rgba(255,255,255,0.06);
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 88px);
    letter-spacing: 4px;
    line-height: 0.9;
    color: var(--paper);
    text-shadow: 4px 4px 0 var(--red);
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-top: 12px;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--panel-light);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 12px;
    letter-spacing: 1px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }

  .stat-pill span {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-pill.red span { color: var(--red); }
  .stat-pill.gold span { color: var(--gold); }
  .stat-pill.green span { color: var(--green); }
  .stat-pill.blue span { color: var(--blue); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--panel-bg);
    padding: 4px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 8px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--red);
    color: white;
  }

  .tab:hover:not(.active) {
    background: rgba(255,255,255,0.05);
    color: var(--text-light);
  }

  /* Section */
  .section { display: none; }
  .section.active { display: block; }

  /* Progress bar for future reads */
  .progress-wrap {
    background: var(--panel-light);
    border-radius: 3px;
    height: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Manga cards */
  .manga-list { display: flex; flex-direction: column; gap: 6px; }

  .manga-card {
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .manga-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .manga-card:hover { background: var(--panel-light); border-color: rgba(255,255,255,0.12); }
  .manga-card:hover::before { opacity: 1; }

  .manga-card.done {
    background: rgba(46, 204, 113, 0.05);
    border-color: rgba(46, 204, 113, 0.15);
  }

  .manga-card.done::before {
    background: var(--green);
    opacity: 1;
  }

  .manga-card.done .manga-title {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  /* Number badge */
  .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: right;
    line-height: 1;
    flex-shrink: 0;
  }

  .manga-card.done .num { color: var(--green); }

  /* Checkbox */
  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .manga-card.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkbox svg { display: none; }
  .manga-card.done .checkbox svg { display: block; }

  /* Info */
  .manga-info { flex: 1; min-width: 0; }

  .manga-title {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s;
  }

  .manga-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  /* Tags */
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

  .tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    font-weight: 700;
  }

  .tag.length-short { background: rgba(52,152,219,0.15); color: #5dade2; border: 1px solid rgba(52,152,219,0.2); }
  .tag.length-medium { background: rgba(212,160,23,0.15); color: #f0b429; border: 1px solid rgba(212,160,23,0.2); }
  .tag.length-long { background: rgba(192,57,43,0.15); color: #e74c3c; border: 1px solid rgba(192,57,43,0.2); }
  .tag.length-very-long { background: rgba(142,68,173,0.15); color: #a569bd; border: 1px solid rgba(142,68,173,0.2); }
  .tag.genre { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.08); }

  /* Currently reading — status dot */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--gold);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-dot.catchup { background: var(--blue); box-shadow: 0 0 6px var(--blue); }

  /* Completed checkmark static */
  .done-badge {
    font-size: 16px;
    flex-shrink: 0;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Reset button */
  .reset-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    float: right;
    margin-bottom: 16px;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  .clearfix::after { content: ''; display: table; clear: both; }

  /* Frieren highlight */
  .manga-card.catchup-highlight {
    border-color: rgba(52,152,219,0.3);
    background: rgba(52,152,219,0.05);
  }
  .manga-card.catchup-highlight::before { background: var(--blue); opacity: 1; }
</style>
</head>

<div class="container">

  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('reading')">📖 Reading</button>
    <button class="tab" onclick="switchTab('future')">🗂 Queue</button>
    <button class="tab" onclick="switchTab('completed')">✅ Completed</button>
  </div>

  <!-- CURRENTLY READING -->
  <div class="section active" id="tab-reading">
    <div class="manga-list" id="list-reading"></div>
  </div>

  <!-- FUTURE READS -->

    </div>
    <div class="progress-label" id="progressLabel">0 / 47 completed</div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="manga-list" id="list-future"></div>
  </div>

  <!-- COMPLETED -->
  <div class="section" id="tab-completed">
    <div class="manga-list" id="list-completed"></div>

</div>

// State
let futureChecked = JSON.parse(localStorage.getItem('manga_future') || '{}');

function saveState() {
  localStorage.setItem('manga_future', JSON.stringify(futureChecked));
}

function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function toggleFuture(idx) {
  futureChecked[idx] = !futureChecked[idx];
  saveState();
  renderFuture();
  updateStats();
}

function renderReading() {
  const el = document.getElementById('list-reading');
  el.innerHTML = READING.map(m => `
    <div class="manga-card ${m.catchup ? 'catchup-highlight' : ''}">
      <div class="status-dot ${m.catchup ? 'catchup' : ''}"></div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="manga-meta">${m.meta}</div>
      </div>
    </div>
  `).join('');
}

function renderFuture() {
  const el = document.getElementById('list-future');
  const doneCount = FUTURE_CLEAN.filter((_, i) => futureChecked[i]).length;
  const pct = Math.round((doneCount / FUTURE_CLEAN.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${doneCount} / ${FUTURE_CLEAN.length} read`;

  el.innerHTML = FUTURE_CLEAN.map((m, i) => `
    <div class="manga-card ${futureChecked[i] ? 'done' : ''}" onclick="toggleFuture(${i})">
      <div class="num">${i + 1}</div>
      <div class="checkbox">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="manga-info">
        <div class="manga-title">${m.title}</div>
        <div class="tags">
          <span class="tag length-${m.length}">${m.length.replace('-', ' ')}</span>
          ${m.genre.split(' / ').map(g => `<span class="tag genre">${g}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderCompleted() {
  const el = document.getElementById('list-completed');
  el.innerHTML = COMPLETED.map(title => `
    <div class="manga-card done" style="cursor:default">
      <div class="done-badge">✓</div>
      <div class="manga-info">
        <div class="manga-title">${title}</div>
      </div>
    </div>
  `).join('');
}

function updateStats() {

  const remaining = FUTURE_CLEAN.length - doneCount;

  document.getElementById('statQueue').textContent = remaining;
  document.getElementById('statDone').textContent = doneCount;
  document.getElementById('statCompleted').textContent = COMPLETED.length;
  document.getElementById('headerSub').textContent = `${READING.length + COMPLETED.length + doneCount} titles in your library`;
}

function resetFuture() {
  if (confirm('Reset all queue progress?')) {
    futureChecked = {};
    saveState();
    renderFuture();
    updateStats();
  }
}

// Init
renderReading();
renderFuture();
renderCompleted();
updateStats();
</script>
</body>
